name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          mkdir bins
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bins/radioserver-linux-amd64 ./cmd/server/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o bins/radioserver-linux-arm64 ./cmd/server/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm go build -o bins/radioserver-linux-arm ./cmd/server/
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o bins/radioserver-windows-amd64.exe ./cmd/server/

      - name: Create archives
        run: |
          cd bins
          for f in *; do
            zip "../${f}.zip" "$f"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bins/*.zip
